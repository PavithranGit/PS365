<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>PS365 - Study Journal</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<link rel="stylesheet"
href="css/common.css">

<link rel="stylesheet"
href="css/study.css">

</head>

<body>

<div class="mobile-container">

<!-- ================= HEADER ================= -->

<header class="app-header">

<div class="header-top">

<div>

<h1>

📚 Study Journal

</h1>

<p>

Plan • Study • Complete

</p>

</div>

<div class="header-icon">

<i class="fa-solid fa-book-open-reader"></i>

</div>

</div>

</header>

<!-- ================= DATE ================= -->

<section class="card">

<div class="section-title">

<i class="fa-solid fa-calendar-days"></i>

Study Date

</div>

<input

type="date"

id="studyDate">

</section>

<!-- ================= TODAY'S STUDY PLAN ================= -->

<section class="card">

<div class="section-title">

<i class="fa-solid fa-list-check"></i>

Today's Study Plan

</div>

<div class="add-topic-container">

<input

type="text"

id="topicInput"

placeholder="Example : Thirukkural 391-400">

<button

id="addTopicBtn">

<i class="fa-solid fa-plus"></i>

</button>

</div>

<div class="quick-topics">

<button class="chip">

📖 Thirukkural

</button>

<button class="chip">

📘 English

</button>

<button class="chip">

🏛 History

</button>

<button class="chip">

⚖ Polity

</button>

<button class="chip">

🌍 Geography

</button>

<button class="chip">

💰 Economy

</button>

<button class="chip">

📰 Current Affairs

</button>

<button class="chip">

🧠 Mental Ability

</button>

</div>

<div

id="topicList"

class="topic-list">

<!-- Dynamic Topics -->

</div>

</section>

<!-- ================= STUDY SESSION ================= -->

<section class="card">

<div class="section-title">

<i class="fa-solid fa-stopwatch"></i>

Study Session

</div>

<div

class="timer-card">

<div

class="timer-display"

id="timerDisplay">

00:00:00

</div>

<div

class="study-status"

id="studyStatus">

⚪ Ready to Study

</div>

<div

class="session-info">

<div>

<label>

Started

</label>

<strong id="startTime">

--

</strong>

</div>

<div>

<label>

Ended

</label>

<strong id="endTime">

--

</strong>

</div>

</div>

<div

class="timer-buttons">

<button id="startBtn">

▶ Start

</button>

<button id="pauseBtn">

⏸ Pause

</button>

<button id="resumeBtn">

▶ Resume

</button>

<button id="stopBtn">

⏹ Stop

</button>

</div>

</div>

</section>

<!-- ================= SESSION HISTORY ================= -->

<section class="card">

    <div class="section-title">

        <i class="fa-solid fa-clock-rotate-left"></i>

        Today's Session History

    </div>

    <div id="sessionHistory" class="session-history">

        <div class="empty-session">

            <i class="fa-regular fa-clock"></i>

            <p>

                No study sessions yet.

            </p>

        </div>

    </div>

    <div class="total-study">

        <span>

            Total Study Today

        </span>

        <strong id="todayTotal">

            00:00:00

        </strong>

    </div>

</section>

<!-- ================= TODAY'S PROGRESS ================= -->

<section class="card">

    <div class="section-title">

        <i class="fa-solid fa-chart-line"></i>

        Today's Progress

    </div>

    <div class="progress-row">

        <span>

            Topics Completed

        </span>

        <strong id="completedCount">

            0 / 0

        </strong>

    </div>

    <div class="progress">

        <div

            id="topicProgress"

            class="progress-fill">

        </div>

    </div>

    <br>

    <div class="progress-row">

        <span>

            Daily Goal

        </span>

        <strong id="goalPercent">

            0%

        </strong>

    </div>

    <div class="progress">

        <div

            id="goalProgress"

            class="progress-fill">

        </div>

    </div>

</section>

<!-- ================= STUDY NOTES ================= -->

<section class="card">

    <div class="section-title">

        <i class="fa-solid fa-note-sticky"></i>

        Study Notes

    </div>

    <textarea

        id="notes"

        rows="6"

        placeholder="Write today's learning summary...">

    </textarea>

</section>

<!-- ================= ACTIONS ================= -->

<section class="card">

    <div class="action-buttons">

        <button

            id="saveBtn"

            class="primary-btn">

            <i class="fa-solid fa-floppy-disk"></i>

            Save Study

        </button>

        <button

            id="emailBtn"

            class="secondary-btn">

            <i class="fa-solid fa-envelope"></i>

            Email Report

        </button>

    </div>

</section>

<!-- ================= BOTTOM NAVIGATION ================= -->

<nav class="bottom-nav">

    <a href="dashboard.html">

        <i class="fa-solid fa-house"></i>

        <span>

            Home

        </span>

    </a>

    <a href="study.html" class="active">

        <i class="fa-solid fa-book-open"></i>

        <span>

            Study

        </span>

    </a>

    <a href="calendar.html">

        <i class="fa-solid fa-calendar-days"></i>

        <span>

            Calendar

        </span>

    </a>

    <a href="stats.html">

        <i class="fa-solid fa-chart-column"></i>

        <span>

            Stats

        </span>

    </a>

    <a href="settings.html">

        <i class="fa-solid fa-gear"></i>

        <span>

            Settings

        </span>

    </a>

</nav>

</div>

<script src="js/app.js"></script>

<script src="js/storage.js"></script>

<script src="js/study.js"></script>

</body>

</html>
