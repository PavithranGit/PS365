<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>PS365 - Study Journal</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <link rel="stylesheet"
          href="css/common.css">

    <link rel="stylesheet"
          href="css/study.css">

</head>

<body>

<div class="mobile-container">

    <!-- Header -->

    <header class="app-header">

        <h1>

            📒 Study Journal

        </h1>

        <p>

            Record Today's Preparation

        </p>

    </header>

    <!-- Date -->

    <section class="card">

        <div class="section-title">

            <i class="fa-solid fa-calendar-days"></i>

            Study Date

        </div>

        <input
            type="date"
            id="studyDate">

    </section>

    <!-- Study Hours -->

    <section class="card">

        <div class="section-title">

            <i class="fa-solid fa-clock"></i>

            Study Hours

        </div>

        <input
            type="number"
            id="studyHours"
            min="0"
            max="24"
            placeholder="Enter Study Hours">

    </section>

    <!-- Subject -->

    <section class="card">

        <div class="section-title">

            <i class="fa-solid fa-book"></i>

            Main Subject

        </div>

        <select id="subject">

            <option value="">Select Subject</option>

            <option>General Tamil</option>

            <option>General English</option>

            <option>History</option>

            <option>Indian Polity</option>

            <option>Indian Economy</option>

            <option>Science</option>

            <option>Geography</option>

            <option>Environment</option>

            <option>Current Affairs</option>

            <option>Mental Ability</option>

        </select>

    </section>

    <!-- Today's Focus -->

    <section class="card">

        <div class="section-title">

            <i class="fa-solid fa-bullseye"></i>

            Today's Focus

        </div>


                <div class="focus-grid">

            <div class="focus-item">

                <label>📖 Thirukkural</label>

                <input
                    type="text"
                    id="thirukkural"
                    placeholder="391-400">

            </div>

            <div class="focus-item">

                <label>📘 SA (Synonyms & Antonyms)</label>

                <input
                    type="text"
                    id="sa"
                    placeholder="1401-1425">

            </div>

            <div class="focus-item">

                <label>📗 PV (Phrasal Verbs)</label>

                <input
                    type="text"
                    id="pv"
                    placeholder="298-312">

            </div>

            <div class="focus-item">

                <label>📙 HH (Homonyms / Homophones)</label>

                <input
                    type="text"
                    id="hh"
                    placeholder="261-270">

            </div>

            <div class="focus-item">

                <label>📚 Grammar</label>

                <input
                    type="text"
                    id="grammar"
                    placeholder="Tenses">

            </div>

            <div class="focus-item">

                <label>🏛 History</label>

                <input
                    type="text"
                    id="history"
                    placeholder="Sangam Age">

            </div>

            <div class="focus-item">

                <label>⚖️ Polity</label>

                <input
                    type="text"
                    id="polity"
                    placeholder="President">

            </div>

            <div class="focus-item">

                <label>📰 Current Affairs</label>

                <input
                    type="text"
                    id="currentAffairTopic"
                    placeholder="July Week 1">

            </div>

        </div>

    </section>

    <!-- Activities -->

    <section class="card">

        <div class="section-title">

            <i class="fa-solid fa-list-check"></i>

            Today's Activities

        </div>

        <label class="check-item">

            <input
                type="checkbox"
                id="revision">

            Revision Completed

        </label>

        <label class="check-item">

            <input
                type="checkbox"
                id="currentAffairs">

            Current Affairs Completed

        </label>

        <label class="check-item">

            <input
                type="checkbox"
                id="mentalAbility">

            Mental Ability Practice

        </label>

    </section>


        <!-- Notes -->

    <section class="card">

        <div class="section-title">

            <i class="fa-solid fa-note-sticky"></i>

            Study Notes

        </div>

        <textarea
            id="notes"
            rows="6"
            placeholder="Write today's study summary..."></textarea>

    </section>

    <!-- Actions -->

    <section class="card">

        <div class="section-title">

            <i class="fa-solid fa-bolt"></i>

            Actions

        </div>

        <button id="saveBtn" class="primary-btn">

            <i class="fa-solid fa-floppy-disk"></i>

            Save Progress

        </button>

        <button id="emailBtn" class="secondary-btn">

            <i class="fa-solid fa-envelope"></i>

            Email Today's Report

        </button>

        <button id="resetBtn" class="danger-btn">

            <i class="fa-solid fa-rotate-left"></i>

            Reset

        </button>

    </section>

</div>

<!-- Bottom Navigation -->

<nav class="bottom-nav">

    <a href="dashboard.html">

        <i class="fa-solid fa-house"></i>

        <span>Home</span>

    </a>

        <i class="fa-solid fa-book-open"></i>

    </a>

        <span>Calendar</span>

    </a>

    <a href="stats.html">

        <i class="fa-solid fa-chart-simple"></i>

        <span>Stats</span>

    </a>

    <a href="settings.html">

        <i class="fa-solid fa-gear"></i>

        <span>Settings</span>

    </a>

</nav>

<script src="js/app.js"></script>

<script src="js/storage.js"></script>

<script src="js/study.js"></script>

</body>

</html>
