<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>PS365 - Profile</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/profile.css">
    <link rel="stylesheet" href="css/common.css">

</head>

<body>

<div class="container">

    <header>

        <h1>👤 Profile</h1>

        <p>Manage your study profile</p>

    </header>

    <main>

        <section class="card">

            <h2>Personal Details</h2>

            <label>Name</label>
            <input type="text" id="name" placeholder="Enter your name">

            <label>Exam</label>
            <select id="exam">
                <option>TNPSC Group 1</option>
                <option>TNPSC Group 2</option>
                <option>Both</option>
            </select>

        </section>

        <section class="card">

            <h2>Daily Targets</h2>

            <label>Study Hours</label>
            <input type="number" id="targetHours" min="1" max="24">

            <label>MCQs</label>
            <input type="number" id="targetMcqs" min="0">

        </section>

        <section class="card">

            <button id="saveProfile">
                💾 Save Profile
            </button>

        </section>

    </main>

</div>
