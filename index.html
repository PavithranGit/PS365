<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>PS365 - Prepare • Study • Succeed</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/index.css">

</head>

<body>

<div class="mobile-container">

    <!-- Hero -->

    <section class="hero">

        <h1>📱 Aspire365</h1>

        <p class="subtitle">

            Prepare • Study • Succeed

        </p>

    </section>

    <!-- Greeting -->

    <section class="card greeting-card">

        <div class="greeting-icon">

            🌸

        </div>

        <div>

            <h2 id="greeting"></h2>

            <p>

                Every study session brings you closer to becoming a TNPSC Officer.

            </p>

        </div>

    </section>

    <!-- Quote -->

    <section class="card">

        <div class="card-title">

            <i class="fa-solid fa-heart"></i>

            <span>Quote of the Day</span>

        </div>

        <p id="quote">

            Loading...

        </p>

    </section>

    <!-- Countdown -->

    <section class="card">

        <div class="card-title">

            <i class="fa-solid fa-bullseye"></i>

            <span>Exam Countdown</span>

        </div>

        <h2 id="countdown">

            -- Days Left

        </h2>

        <small>

            🎯 TNPSC Group 1 • 06 September 2026

        </small>

        <div class="progress">

            <div class="progress-fill" id="countdownProgress"></div>

        </div>

    </section>

    <!-- Motivation Video -->

    <section class="card">

        <div class="card-title">

            <i class="fa-brands fa-youtube"></i>

            <span>Today's Motivation</span>

        </div>

        <div class="video-card">

            <h3 id="videoTitle">

                Believe in Yourself

            </h3>

            <button id="watchVideo">

                ▶ Watch Motivation

            </button>

        </div>

    </section>

    <!-- Daily Promise -->

    <section class="card">

        <div class="card-title">

            <i class="fa-solid fa-handshake"></i>

            <span>Today's Promise</span>

        </div>

        <label class="promise">

            <input type="checkbox" id="promiseCheck">

            Today I will study sincerely without giving up.

        </label>

        <p id="promiseMessage"></p>

    </section>

    <!-- Journey -->

    <button class="study-btn"

        onclick="window.location.href='dashboard.html'">

        🚀 Start Today's Journey

    </button>

</div>

<script src="js/app.js"></script>
<script src="js/storage.js"></script>
<script src="js/index.js"></script>
</body>

</html>
