        <h1>⚙️ Settings</h1>

        <p>Application Settings</p>

    </header>

    <main>

        <section class="card">

            <h2>Appearance</h2>

            <label>
                <input type="checkbox" id="darkMode">
                Enable Dark Mode
            </label>

        </section>

        <section class="card">

            <h2>Notifications</h2>

            <label>
                <input type="checkbox" id="dailyReminder">
                Daily Study Reminder
            </label>

        </section>

        <section class="card">

            <h2>Data Management</h2>

            <button id="exportData">
                📤 Export Data
            </button>

            <button id="importData">
                📥 Import Data
            </button>

            <button id="resetData">
                🗑 Reset All Data
            </button>

        </section>

        <section class="card">

            <h2>About PS365</h2>

            <p>Version 1.0</p>
            <p>Built By Pavithran for Her Success.</p>
