<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>PS365 - Statistics</title>

    <!-- Google Font -->

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <link rel="stylesheet" href="css/common.css">

    <link rel="stylesheet" href="css/stats.css">

</head>

<body>

<div class="mobile-container">

    <!-- Header -->

    <header class="app-header">

        <div class="logo">

            📊 <strong>PS365</strong>

        </div>

        <div class="tagline">

            Study Statistics

        </div>

    </header>

    <!-- Overview -->

    <section class="card">

        <div class="card-title">

            <i class="fa-solid fa-chart-column"></i>

            Overview

        </div>

        <div class="stats-grid">

            <div class="stat-box">

                <h2 id="totalHours">0</h2>

                <p>Study Hours</p>

            </div>

            <div class="stat-box">

                <h2 id="totalMcqs">0</h2>

                <p>MCQs</p>

            </div>

            <div class="stat-box">

                <h2 id="studyDays">0</h2>

                <p>Study Days</p>

            </div>

            <div class="stat-box">

                <h2 id="currentStreak">0</h2>

                <p>Current Streak</p>

            </div>

        </div>

    </section>

    <!-- Progress -->

    <section class="card">

        <div class="card-title">

            <i class="fa-solid fa-medal"></i>

            Achievements

        </div>

        <div class="achievement-row">

            <span>📖 Revision Completed</span>

            <strong id="revisionCount">0</strong>

        </div>

        <div class="achievement-row">

            <span>📰 Current Affairs</span>

            <strong id="currentAffairsCount">0</strong>

        </div>

        <div class="achievement-row">

            <span>🎯 Mock Tests</span>

            <strong id="mockTestCount">0</strong>

        </div>

    </section>

    <!-- Subject Wise -->

    <section class="card">

        <div class="card-title">

            <i class="fa-solid fa-book"></i>

            Subject Wise Study

        </div>

        <div id="subjectStats">

            <p>No Data Available</p>

        </div>

    </section>

</div>

<!-- Bottom Navigation -->

<nav class="bottom-nav">

    <a href="dashboard.html">

        <i class="fa-solid fa-house"></i>

        <span>Home</span>

    </a>

    <a href="study.html">

        <i class="fa-solid fa-book-open"></i>

        <span>Study</span>

    </a>

    <a href="calendar.html">

        <i class="fa-solid fa-calendar"></i>

        <span>Calendar</span>

    </a>

    <a href="stats.html" class="active">

        <i class="fa-solid fa-chart-simple"></i>

        <span>Stats</span>

    </a>

    <a href="settings.html">

        <i class="fa-solid fa-gear"></i>

        <span>Settings</span>

    </a>

</nav>

<script src="js/app.js"></script>

<script src="js/storage.js"></script>

<script src="js/stats.js"></script>

</body>

</html>
